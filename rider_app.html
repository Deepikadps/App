<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1a56db">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Smart Fix Rider</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,sans-serif}
body{background:#f1f5f9;min-height:100vh}
#LS{min-height:100vh;background:linear-gradient(135deg,#1e3a8a,#1a56db);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.lico{font-size:56px;margin-bottom:12px}
.lttl{color:#fff;font-size:24px;font-weight:700;margin-bottom:4px}
.lsub{color:rgba(255,255,255,.75);font-size:14px;margin-bottom:28px}
.lbox{background:#fff;border-radius:20px;padding:28px 24px;width:100%;max-width:340px}
.lbox h2{font-size:18px;font-weight:700;color:#1e293b;margin-bottom:20px;text-align:center}
label{display:block;font-size:13px;font-weight:600;color:#475569;margin-bottom:5px}
.inp{width:100%;padding:13px;border:2px solid #e2e8f0;border-radius:12px;font-size:16px;color:#1e293b;outline:none;margin-bottom:14px;background:#fff}
.inp:focus{border-color:#1a56db}
.lbtn{width:100%;padding:14px;background:#1a56db;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer}
.lbtn:active{opacity:.85}
.lerr{display:none;color:#be123c;font-size:13px;text-align:center;margin-top:10px;padding:8px;background:#fff1f2;border-radius:8px}

#AP{display:none}
.hdr{background:#1a56db;color:#fff;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:5}
.hdr h1{font-size:16px;font-weight:700}
.hdr p{font-size:11px;opacity:.8;margin-top:1px}
.hdr-r{display:flex;align-items:center;gap:8px}
.pcnt{background:rgba(255,255,255,.25);border-radius:20px;padding:3px 12px;color:#fff;font-size:13px;font-weight:700}
.obtn{background:rgba(255,255,255,.2);border:none;color:#fff;padding:6px 10px;border-radius:8px;font-size:12px;cursor:pointer}

.tabs{display:flex;background:#fff;border-bottom:2px solid #e2e8f0;overflow-x:auto;position:sticky;top:56px;z-index:4}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:60px;padding:11px 4px;font-size:11px;font-weight:600;text-align:center;cursor:pointer;color:#64748b;border-bottom:3px solid transparent;white-space:nowrap}
.tab.on{color:#1a56db;border-bottom-color:#1a56db}

.pg{padding:10px;display:none}
.pg.on{display:block}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}
.st{background:#fff;border-radius:10px;padding:8px 4px;text-align:center;border:1px solid #e2e8f0}
.st b{display:block;font-size:18px;font-weight:700;color:#1e293b}
.st small{font-size:10px;color:#64748b}

.date-header{padding:6px 2px 3px;font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:6px}
.date-pill{background:#f0fdf4;color:#166534;font-size:11px;padding:2px 10px;border-radius:10px;font-weight:700}
.area-header{padding:4px 2px 2px;font-size:11px;font-weight:600;color:#94a3b8;display:flex;align-items:center;gap:5px}
.area-pill{background:#dbeafe;color:#1d4ed8;font-size:11px;padding:2px 8px;border-radius:8px;font-weight:600}

.card{background:#fff;border-radius:14px;border:1px solid #e2e8f0;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.cbody{padding:12px 14px 10px;cursor:pointer}
.ctop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px}
.ccon{font-size:14px;font-weight:700;color:#1e293b}
.cname{font-size:13px;color:#475569;margin-top:1px}
.cotag{font-size:10px;padding:2px 8px;border-radius:8px;font-weight:700;background:#f1f5f9;color:#475569}
.caddr{font-size:12px;color:#64748b;margin:5px 0 8px;line-height:1.4}
.cfoot{display:flex;justify-content:space-between;align-items:center}
.pbadge{font-size:12px;font-weight:700;padding:4px 10px;border-radius:8px}
.pcod{background:#fff7ed;color:#c2410c}
.ponl{background:#f0fdf4;color:#16a34a}
.ibtns{display:flex;gap:6px}
.ibtn{padding:7px 10px;border-radius:8px;border:none;cursor:pointer;font-size:14px;background:#f1f5f9}

.acts{display:grid;grid-template-columns:1fr 1fr 1fr;border-top:1px solid #f1f5f9}
.act{padding:11px 4px;border:none;cursor:pointer;font-size:11px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:3px}
.act.d{background:#16a34a;color:#fff}
.act.h{background:#f59e0b;color:#fff}
.act.r{background:#ef4444;color:#fff}
.act:active{opacity:.75}

.dc{background:#fff;border-radius:14px;border:1px solid #e2e8f0;padding:12px 14px;margin-bottom:8px}
.bdg{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:700;padding:2px 8px;border-radius:8px}
.bd{background:#f0fdf4;color:#166534}
.bh{background:#fffbeb;color:#92400e}
.br{background:#fff1f2;color:#be123c}

.ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;display:none;align-items:flex-end;justify-content:center}
.ov.on{display:flex}
.mod{background:#fff;border-radius:24px 24px 0 0;padding:20px 16px 36px;width:100%;max-width:500px;max-height:92vh;overflow-y:auto}
.mbar{width:40px;height:4px;background:#cbd5e1;border-radius:2px;margin:0 auto 16px}
.mtit{font-size:18px;font-weight:700;color:#1e293b;margin-bottom:4px}
.msub{font-size:13px;color:#64748b;margin-bottom:14px}
.irow{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid #f8fafc;align-items:flex-start}
.iico{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.ilbl{font-size:11px;color:#64748b}
.ival{font-size:14px;font-weight:600;color:#1e293b;margin-top:1px}
.mbr{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.mb{padding:13px;border-radius:12px;border:none;cursor:pointer;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:6px}
.mbc{background:#eff6ff;color:#1d4ed8}
.mbw{background:#dcfce7;color:#15803d}
.a3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-top:10px}
.a3 button{padding:13px 4px;border:none;border-radius:12px;cursor:pointer;font-size:12px;font-weight:700}

.ri{padding:14px 16px;border:2px solid #e2e8f0;border-radius:12px;margin-bottom:8px;cursor:pointer;font-size:14px;color:#1e293b;background:#fff;user-select:none}
.ri.sel{border-color:#1a56db;background:#eff6ff;color:#1d4ed8;font-weight:700}
.cbtn{width:100%;padding:14px;border:none;border-radius:12px;cursor:pointer;font-size:15px;font-weight:700;margin-top:10px}
.xbtn{width:100%;padding:12px;border:2px solid #e2e8f0;border-radius:12px;cursor:pointer;font-size:14px;color:#64748b;background:#fff;margin-top:8px;font-weight:600}

.route-hdr{background:linear-gradient(135deg,#1e3a8a,#1a56db);color:#fff;border-radius:16px;padding:16px;margin-bottom:14px}
.stop{display:flex}
.sl{display:flex;flex-direction:column;align-items:center;width:28px;flex-shrink:0}
.sd{width:14px;height:14px;border-radius:50%;border:3px solid #1a56db;background:#fff;margin-top:16px;flex-shrink:0}
.sd.f{background:#1a56db}
.sd.l{background:#16a34a;border-color:#16a34a}
.sv{flex:1;width:2px;background:#bfdbfe;min-height:10px}
.sc{flex:1;background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:12px 14px;margin:6px 0 6px 8px}
.si{font-size:12px;color:#475569;background:#f8fafc;padding:5px 8px;border-radius:8px;display:flex;justify-content:space-between;margin-top:4px}

.rpt-box{background:#fff;border-radius:14px;border:1px solid #e2e8f0;overflow:hidden;margin-bottom:10px}
.rpt-hdr{padding:10px 14px;background:#f8fafc;border-bottom:1px solid #e2e8f0;font-size:12px;font-weight:700;color:#64748b;text-transform:uppercase}
.rrow{padding:10px 14px;border-bottom:1px solid #f8fafc;display:flex;justify-content:space-between;align-items:flex-start}
.pdfb{width:100%;padding:13px;background:#1a56db;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px}

.empty{text-align:center;padding:48px 20px;color:#94a3b8;font-size:14px}
.loading{text-align:center;padding:32px;color:#64748b;font-size:14px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:100;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1}
</style>
</head>
<body>

<div id="LS">
  <div class="lico">🚴</div>
  <div class="lttl">Smart Fix Delivery</div>
  <div class="lsub">Rider App</div>
  <div class="lbox">
    <h2>Sign In</h2>
    <label>Rider ID</label>
    <input class="inp" type="text" id="ui" placeholder="e.g. R001" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <label>PIN</label>
    <input class="inp" type="password" id="up" placeholder="Enter PIN" inputmode="numeric" onkeydown="if(event.key==='Enter')signin()">
    <button class="lbtn" onclick="signin()">Sign In →</button>
    <div class="lerr" id="lerr"></div>
  </div>
</div>

<div id="AP">
  <div class="hdr">
    <div><h1>Smart Fix Delivery</h1><p id="rname"></p></div>
    <div class="hdr-r">
      <span class="pcnt" id="pcnt">0</span>
      <button class="obtn" onclick="refreshData()">↻</button>
      <button class="obtn" onclick="signout()">Logout</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab on" onclick="goTab(this,'pg-p')">📦 Pending</div>
    <div class="tab" onclick="goTab(this,'pg-h')">⏸ Hold</div>
    <div class="tab" onclick="goTab(this,'pg-r')">🗺 Route</div>
    <div class="tab" onclick="goTab(this,'pg-d')">✅ Done</div>
    <div class="tab" onclick="goTab(this,'pg-rt')">↩ Return</div>
    <div class="tab" onclick="goTab(this,'pg-rp')">📄 Report</div>
  </div>

  <div id="pg-p" class="pg on">
    <div class="stats">
      <div class="st"><b id="sp">0</b><small>Pending</small></div>
      <div class="st"><b id="sh" style="color:#d97706">0</b><small>Hold</small></div>
      <div class="st"><b id="sc" style="color:#c2410c">0</b><small>COD</small></div>
      <div class="st"><b id="so" style="color:#16a34a">0</b><small>Online</small></div>
    </div>
    <div id="pl"></div>
  </div>

  <div id="pg-h" class="pg"><p style="padding:10px 2px 4px;font-size:13px;color:#64748b" id="hl">0 on hold</p><div id="hl2"></div></div>
  <div id="pg-r" class="pg"><div id="rl"></div></div>
  <div id="pg-d" class="pg"><p style="padding:10px 2px 4px;font-size:13px;color:#64748b" id="dl">0 delivered</p><div id="dl2"></div></div>
  <div id="pg-rt" class="pg"><p style="padding:10px 2px 4px;font-size:13px;color:#64748b" id="rtl">0 returns</p><div id="rl2"></div></div>

  <div id="pg-rp" class="pg">
    <p style="font-size:17px;font-weight:700;color:#1e293b;margin-bottom:4px">End of Day Report</p>
    <p style="font-size:12px;color:#64748b;margin-bottom:10px" id="rdate"></p>
    <div class="stats" style="grid-template-columns:1fr 1fr">
      <div class="st"><b id="rd" style="color:#16a34a">0</b><small>Delivered</small></div>
      <div class="st"><b id="rr" style="color:#be123c">0</b><small>Returns</small></div>
      <div class="st"><b id="rh" style="color:#d97706">0</b><small>Hold</small></div>
      <div class="st"><b id="rc" style="color:#c2410c;font-size:13px">AED 0</b><small>COD</small></div>
    </div>
    <div class="rpt-box"><div class="rpt-hdr">All Shipments</div><div id="rpt"></div></div>
    <button class="pdfb" onclick="makePDF()">⬇ Download PDF</button>
  </div>
</div>

<div class="ov" id="ov1" onclick="if(event.target===this)closeOv('ov1')">
  <div class="mod"><div class="mbar"></div><div id="ob"></div></div>
</div>
<div class="ov" id="ov2" onclick="if(event.target===this)closeOv('ov2')">
  <div class="mod"><div class="mbar"></div><div id="rb"></div></div>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script>
var API = 'https://script.google.com/macros/s/AKfycbwN2YOLLu39LxuPg76Jf95KFJYrM3Rbl23xfK3RGjZ2iT7xiocha6mOMDWWgB2u9mC3hA/exec';
var RR = ['Customer not available','Customer refused delivery','Wrong address','Damaged item','Customer requested return','Other'];
var HR = ['Customer asked for tomorrow','Customer not home – will call back','Address needs confirmation','Payment issue – will resolve','Other'];
var me=null, selS=null, selAct=null, selR=null;
// D.pending = active shipments from sheet (pending + hold)
// D.hold = items rider marked as hold today
// D.done = items rider marked as delivered today
// D.ret  = items rider marked as return today
var D={pending:[],hold:[],done:[],ret:[]};

function g(id){return document.getElementById(id)}
function sv(id,v){var e=g(id);if(e)e.textContent=v}
function toast(m){var t=g('toast');t.textContent=m;t.classList.add('on');setTimeout(function(){t.classList.remove('on')},2400)}

function apiGet(action,params,cb){
  var p=Object.assign({action:action},params||{});
  var qs=Object.keys(p).map(function(k){return encodeURIComponent(k)+'='+encodeURIComponent(p[k]);}).join('&');
  fetch(API+'?'+qs,{method:'GET',redirect:'follow'})
  .then(function(r){return r.json();})
  .then(function(res){cb(res);})
  .catch(function(e){console.error(e);cb(null);});
}

// ── SESSION ──
function saveSession(){try{localStorage.setItem('sfRider',JSON.stringify(me));}catch(e){}}
function loadSession(){try{var s=localStorage.getItem('sfRider');if(s){me=JSON.parse(s);return true;}}catch(e){}return false;}
function clearSession(){try{localStorage.removeItem('sfRider');}catch(e){}}

// ── LOGIN ──
function signin(){
  var id=g('ui').value.trim(), pin=g('up').value.trim();
  if(!id||!pin){showErr('Enter Rider ID and PIN');return;}
  apiGet('login',{riderId:id,pin:pin},function(res){
    if(res&&res.success){me=res.rider;saveSession();launch();}
    else showErr('Invalid ID or PIN');
  });
}
function showErr(m){var e=g('lerr');e.textContent=m;e.style.display='block';}
function signout(){clearSession();me=null;D={pending:[],hold:[],done:[],ret:[]};g('AP').style.display='none';g('LS').style.display='flex';g('ui').value='';g('up').value='';g('lerr').style.display='none';}
function launch(){g('LS').style.display='none';g('AP').style.display='block';sv('rname','Hi, '+me.name);loadData();}
function refreshData(){toast('Refreshing...');loadData();}

// ── LOAD FROM SHEET ──
function loadData(){
  g('pl').innerHTML='<div class="loading">Loading shipments...</div>';
  apiGet('getShipments',{riderId:me.id},function(res){
    if(res&&res.shipments){
      // Split into pending and hold based on Status in sheet
      D.pending=[];
      res.shipments.forEach(function(s){
        var m=mapRow(s);
        // Hold items from sheet stay in hold tab
        // Pending items go to pending tab
        if(m.status.toLowerCase()==='hold') D.hold.push(m);
        else D.pending.push(m);
      });
      draw();
    } else {
      g('pl').innerHTML='<div class="empty">No shipments assigned</div>';
    }
  });
}

function mapRow(s){
  return {
    con:String(s['Con.No']||''),
    company:String(s['Company']||''),
    customer:String(s['Customer Name']||''),
    phone:String(s['Phone']||''),
    address:String(s['Address']||''),
    area:String(s['Location']||''),
    amount:Number(s['Prod.Amount'])||0,
    courier:Number(s['Courier'])||0,
    balance:Number(s['Balance'])||0,
    payment:String(s['Payment Type']||'COD'),
    status:String(s['Status']||'Pending'),
    date:String(s['Date']||''),
    returnReason:String(s['Return Reason']||''),
    holdReason:String(s['Hold Reason']||'')
  };
}

// ── DRAW ──
function draw(){
  sv('pcnt',D.pending.length);
  sv('sp',D.pending.length);
  sv('sh',D.hold.length);
  sv('sc',D.pending.filter(function(x){return x.payment.toUpperCase()==='COD';}).length);
  sv('so',D.pending.filter(function(x){return x.payment.toUpperCase()!=='COD';}).length);
  sv('hl',D.hold.length+' on hold');
  sv('dl',D.done.length+' delivered today');
  sv('rtl',D.ret.length+' returns today');
  drawP();drawH();drawD();drawR();drawRoute();drawReport();
}

function grpDate(list){
  var g={};
  list.forEach(function(x){
    var d=x.date||'No Date';
    if(!g[d])g[d]={};
    var a=x.area||'Unknown';
    if(!g[d][a])g[d][a]=[];
    g[d][a].push(x);
  });
  return g;
}

function grpArea(list){
  var g={};
  list.forEach(function(x){var a=x.area||'Unknown';if(!g[a])g[a]=[];g[a].push(x);});
  return g;
}

function drawP(){
  if(!D.pending.length){g('pl').innerHTML='<div class="empty">🎉 All done for today!</div>';return;}
  var dates=grpDate(D.pending),dkeys=Object.keys(dates);
  var h='';
  dkeys.forEach(function(date){
    var areas=dates[date],akeys=Object.keys(areas);
    h+='<div class="date-header"><span class="date-pill">📅 '+date+'</span></div>';
    akeys.forEach(function(area){
      h+='<div class="area-header"><span class="area-pill">📍 '+area+'</span><span style="color:#94a3b8;font-size:11px">&nbsp;'+areas[area].length+' stop'+(areas[area].length>1?'s':'')+'</span></div>';
      areas[area].forEach(function(x){h+=cardHTML(x);});
    });
  });
  g('pl').innerHTML=h;
}

function cardHTML(x){
  var ph=x.phone.replace(/\D/g,'');
  var waNum=ph.startsWith('0')?'971'+ph.slice(1):ph;
  var payText=x.payment.toUpperCase()==='COD'?'💰 COD: AED '+x.balance:'✅ Online Paid';
  var waMsg=encodeURIComponent('Hi, I am from Smart Fix Courier.\nI have a delivery for you.\n\n📦 Tracking: '+x.con+'\n📍 Area: '+x.area+'\n💳 Payment: '+(x.payment.toUpperCase()==='COD'?'Cash on Delivery - AED '+x.balance:'Online (Already Paid)')+'\n\nPlease be available. Thank you!');
  return '<div class="card">'+
    '<div class="cbody" onclick="openDetail(\''+x.con+'\')">'+
      '<div class="ctop"><div><div class="ccon">📦 '+x.con+'</div><div class="cname">'+x.customer+'</div></div><span class="cotag">'+x.company+'</span></div>'+
      '<div class="caddr">📍 '+x.address+'</div>'+
      '<div class="cfoot">'+
        '<span class="pbadge '+(x.payment.toUpperCase()==='COD'?'pcod':'ponl')+'">'+payText+'</span>'+
        '<div class="ibtns" onclick="event.stopPropagation()">'+
          '<button class="ibtn" style="background:#eff6ff" onclick="window.location.href=\'tel:'+x.phone+'\'">📞</button>'+
          '<button class="ibtn" style="background:#dcfce7" onclick="window.open(\'https://wa.me/'+waNum+'?text='+waMsg+'\',\'_blank\')">💬</button>'+
        '</div>'+
      '</div>'+
    '</div>'+
    '<div class="acts">'+
      '<button class="act d" onclick="doAct(\''+x.con+'\',\'delivered\')"><span>✅</span>Delivered</button>'+
      '<button class="act h" onclick="openReason(\''+x.con+'\',\'hold\',false)"><span>⏸</span>Hold</button>'+
      '<button class="act r" onclick="openReason(\''+x.con+'\',\'return\',false)"><span>↩</span>Return</button>'+
    '</div>'+
  '</div>';
}

function drawH(){
  if(!D.hold.length){g('hl2').innerHTML='<div class="empty">⏸ No items on hold</div>';return;}
  g('hl2').innerHTML=D.hold.map(function(x){
    return '<div class="dc"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px"><span style="font-size:14px;font-weight:700;color:#1e293b">'+x.con+'</span><span class="bdg bh">⏸ Hold</span></div>'+
      '<div style="font-size:13px;color:#475569">'+x.customer+' · '+x.area+'</div>'+
      '<div style="font-size:12px;color:#92400e;margin-top:3px">'+x.holdReason+'</div>'+
      '<div style="display:flex;gap:8px;margin-top:8px">'+
        '<button onclick="doActHold(\''+x.con+'\',\'delivered\')" style="flex:1;padding:9px;background:#16a34a;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700">✅ Deliver Now</button>'+
        '<button onclick="openReason(\''+x.con+'\',\'return\',true)" style="flex:1;padding:9px;background:#fee2e2;color:#be123c;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700">↩ Return</button>'+
      '</div></div>';
  }).join('');
}

function drawD(){
  if(!D.done.length){g('dl2').innerHTML='<div class="empty">✅ No deliveries yet today</div>';return;}
  g('dl2').innerHTML=D.done.map(function(x){return '<div class="dc"><div style="display:flex;justify-content:space-between;margin-bottom:5px"><span style="font-size:14px;font-weight:700;color:#1e293b">'+x.con+'</span><span class="bdg bd">✅ Delivered</span></div><div style="font-size:13px;color:#475569">'+x.customer+' · '+x.area+'</div></div>';}).join('');
}

function drawR(){
  if(!D.ret.length){g('rl2').innerHTML='<div class="empty">↩ No returns yet today</div>';return;}
  g('rl2').innerHTML=D.ret.map(function(x){return '<div class="dc"><div style="display:flex;justify-content:space-between;margin-bottom:5px"><span style="font-size:14px;font-weight:700;color:#1e293b">'+x.con+'</span><span class="bdg br">↩ Return</span></div><div style="font-size:13px;color:#475569">'+x.customer+'</div><div style="font-size:12px;color:#be123c;margin-top:3px">'+x.returnReason+'</div></div>';}).join('');
}

function drawRoute(){
  var areas=grpArea(D.pending),keys=Object.keys(areas);
  if(!keys.length){g('rl').innerHTML='<div class="empty">No pending stops</div>';return;}
  var h='<div class="route-hdr"><div style="font-size:15px;font-weight:700">🗺 Today\'s Route</div><div style="font-size:12px;opacity:.8;margin-top:3px">'+keys.length+' area'+(keys.length>1?'s':'')+' to visit</div></div>';
  keys.forEach(function(area,i){
    var items=areas[area],isF=i===0,isL=i===keys.length-1;
    h+='<div class="stop"><div class="sl">'+(i>0?'<div class="sv"></div>':'<div style="height:16px"></div>')+'<div class="sd'+(isF?' f':isL?' l':'')+'"></div>'+(!isL?'<div class="sv" style="flex:1;min-height:36px"></div>':'')+'</div>'+
      '<div class="sc"><div style="font-size:14px;font-weight:700;color:#1e293b">'+area+'</div><div style="font-size:12px;color:#64748b">'+items.length+' shipment'+(items.length>1?'s':'')+' · Stop '+(i+1)+' of '+keys.length+'</div>'+
      items.map(function(x){return '<div class="si"><span>'+x.con+' — '+x.customer.split(' ')[0]+'</span><span style="font-weight:700;color:'+(x.payment.toUpperCase()==='COD'?'#c2410c':'#16a34a')+'">'+(x.payment.toUpperCase()==='COD'?'AED '+x.balance:'Online')+'</span></div>';}).join('')+'</div></div>';
  });
  g('rl').innerHTML=h;
}

function drawReport(){
  sv('rdate',new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}));
  sv('rd',D.done.length);sv('rr',D.ret.length);sv('rh',D.hold.length);
  var cod=D.done.filter(function(x){return x.payment.toUpperCase()==='COD';}).reduce(function(a,x){return a+x.balance;},0);
  sv('rc','AED '+cod);
  var all=D.done.concat(D.ret).concat(D.hold).concat(D.pending);
  g('rpt').innerHTML=all.length?all.map(function(x){
    var sc=x.status==='Delivered'?'#166534':x.status==='Return'?'#be123c':x.status==='Hold'?'#92400e':'#475569';
    var sb=x.status==='Delivered'?'#f0fdf4':x.status==='Return'?'#fff1f2':x.status==='Hold'?'#fffbeb':'#f1f5f9';
    return '<div class="rrow"><div><div style="font-size:13px;font-weight:700;color:#1e293b">'+x.con+'</div><div style="font-size:12px;color:#64748b">'+x.customer+' · '+x.area+'</div>'+(x.returnReason?'<div style="font-size:11px;color:#be123c">'+x.returnReason+'</div>':'')+(x.holdReason?'<div style="font-size:11px;color:#92400e">'+x.holdReason+'</div>':'')+'</div><div style="text-align:right"><span style="font-size:11px;padding:2px 8px;border-radius:8px;background:'+sb+';color:'+sc+'">'+x.status+'</span><div style="font-size:11px;color:#94a3b8;margin-top:3px">'+(x.payment.toUpperCase()==='COD'?'COD AED '+x.balance:'Online')+'</div></div></div>';
  }).join(''):'<div style="padding:16px;text-align:center;font-size:13px;color:#94a3b8">No data yet</div>';
}

// ── DETAIL MODAL ──
function openDetail(con){
  var x=D.pending.find(function(s){return s.con===con;});if(!x)return;selS=x;
  var ph=x.phone.replace(/\D/g,'');
  var waNum=ph.startsWith('0')?'971'+ph.slice(1):ph;
  var waMsg=encodeURIComponent('Hi, I am from Smart Fix Courier.\nI have a delivery for you.\n\n📦 Tracking: '+x.con+'\n📍 Area: '+x.area+'\n💳 Payment: '+(x.payment.toUpperCase()==='COD'?'Cash on Delivery - AED '+x.balance:'Online (Already Paid)')+'\n\nPlease be available. Thank you!');
  g('ob').innerHTML=
    '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">'+
    '<div><div class="mtit">'+x.customer+'</div><div class="msub">'+x.con+' · '+x.company+'</div></div>'+
    '<button onclick="closeOv(\'ov1\')" style="background:none;border:none;cursor:pointer;color:#94a3b8;font-size:26px;line-height:1">×</button></div>'+
    '<div class="irow"><div class="iico" style="background:#eff6ff">📅</div><div><div class="ilbl">Date</div><div class="ival">'+x.date+'</div></div></div>'+
    '<div class="irow"><div class="iico" style="background:#fef3c7">📍</div><div><div class="ilbl">Address</div><div class="ival">'+x.address+'</div></div></div>'+
    '<div class="irow"><div class="iico" style="background:#fdf4ff">📞</div><div><div class="ilbl">Phone</div><div class="ival">'+x.phone+'</div></div></div>'+
    '<div class="irow"><div class="iico" style="background:'+(x.payment.toUpperCase()==='COD'?'#fff7ed':'#f0fdf4')+'">'+(x.payment.toUpperCase()==='COD'?'💰':'✅')+'</div><div><div class="ilbl">Payment</div><div class="ival">'+(x.payment.toUpperCase()==='COD'?'Cash on Delivery — AED '+x.balance:'Online Paid ✓')+'</div></div></div>'+
    '<div class="irow"><div class="iico" style="background:#f8fafc">🧾</div><div><div class="ilbl">Product / Courier</div><div class="ival">AED '+x.amount+' / AED '+x.courier+'</div></div></div>'+
    '<div class="mbr">'+
      '<button class="mb mbc" onclick="window.location.href=\'tel:'+x.phone+'\'">📞 Call</button>'+
      '<button class="mb mbw" onclick="window.open(\'https://wa.me/'+waNum+'?text='+waMsg+'\',\'_blank\')">💬 WhatsApp</button>'+
    '</div>'+
    '<div class="a3">'+
      '<button onclick="doAct(\''+x.con+'\',\'delivered\');closeOv(\'ov1\')" style="background:#16a34a;color:#fff">✅<br>Delivered</button>'+
      '<button onclick="closeOv(\'ov1\');openReason(\''+x.con+'\',\'hold\',false)" style="background:#f59e0b;color:#fff">⏸<br>Hold</button>'+
      '<button onclick="closeOv(\'ov1\');openReason(\''+x.con+'\',\'return\',false)" style="background:#ef4444;color:#fff">↩<br>Return</button>'+
    '</div>';
  g('ov1').classList.add('on');
}

// ── REASON MODAL ──
function openReason(con,type,fromHold){
  var pool=fromHold?D.hold:D.pending;
  var x=pool.find(function(s){return s.con===con;});if(!x)return;
  selS=x;selAct=type;selR=null;
  var reasons=type==='return'?RR:HR;
  var title=type==='return'?'↩ Return Shipment':'⏸ Hold Shipment';
  var bg=type==='return'?'#ef4444':'#f59e0b';
  var bt=type==='return'?'Confirm Return':'Confirm Hold';
  g('rb').innerHTML='<div class="mtit">'+title+'</div><div class="msub">'+x.con+' · '+x.customer+'</div>'+
    '<div style="font-size:12px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Select Reason</div>'+
    '<div id="rlist">'+reasons.map(function(r,i){return '<div class="ri" onclick="pickR(this,'+i+')">'+r+'</div>';}).join('')+'</div>'+
    '<button class="cbtn" style="background:'+bg+';color:#fff" onclick="confirmR('+fromHold+')">'+bt+'</button>'+
    '<button class="xbtn" onclick="closeOv(\'ov2\')">Cancel</button>';
  g('ov2').classList.add('on');
}

function pickR(el,i){
  document.querySelectorAll('#rlist .ri').forEach(function(x){x.classList.remove('sel');});
  el.classList.add('sel');selR=i;
}

function confirmR(fromHold){
  if(selR===null){toast('Please select a reason');return;}
  var reasons=selAct==='return'?RR:HR;
  var reason=reasons[selR];
  closeOv('ov2');
  if(fromHold)doActHold(selS.con,selAct,reason);
  else doAct(selS.con,selAct,reason);
}

function closeOv(id){g(id).classList.remove('on');}

// ── ACTIONS ──
// After Delivered or Return → remove from app permanently
// After Hold → move to hold tab, stays until delivered/returned
function doAct(con,type,reason){
  var x=D.pending.find(function(s){return s.con===con;});if(!x)return;
  D.pending=D.pending.filter(function(s){return s.con!==con;});
  if(type==='delivered'){
    x.status='Delivered';D.done.push(x);
    toast('✅ Delivered: '+con);
  } else if(type==='hold'){
    x.status='Hold';x.holdReason=reason||'';D.hold.push(x);
    toast('⏸ On Hold: '+con);
  } else {
    x.status='Return';x.returnReason=reason||'';D.ret.push(x);
    toast('↩ Return: '+con);
  }
  sync(x);draw();
}

function doActHold(con,type,reason){
  var x=D.hold.find(function(s){return s.con===con;});if(!x)return;
  D.hold=D.hold.filter(function(s){return s.con!==con;});
  if(type==='delivered'){
    x.status='Delivered';D.done.push(x);
    toast('✅ Delivered: '+con);
  } else {
    x.status='Return';x.returnReason=reason||'';D.ret.push(x);
    toast('↩ Return: '+con);
  }
  sync(x);draw();
}

function sync(x){
  var qs='action=updateStatus&conNo='+encodeURIComponent(x.con)+'&status='+encodeURIComponent(x.status)+'&returnReason='+encodeURIComponent(x.returnReason||'')+'&holdReason='+encodeURIComponent(x.holdReason||'');
  fetch(API+'?'+qs,{method:'GET',redirect:'follow'}).catch(function(){});
}

// ── TABS ──
function goTab(el,pgId){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  document.querySelectorAll('.pg').forEach(function(p){p.classList.remove('on');});
  el.classList.add('on');g(pgId).classList.add('on');
}

// ── PDF ──
function makePDF(){
  if(!window.jspdf){toast('Loading PDF...');return;}
  var doc=new window.jspdf.jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  var pw=doc.internal.pageSize.getWidth();
  var today=new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
  doc.setFillColor(26,86,219);doc.rect(0,0,pw,30,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(16);doc.setFont('helvetica','bold');doc.text('Smart Fix Delivery',14,13);
  doc.setFontSize(9);doc.setFont('helvetica','normal');doc.text('Rider: '+(me?me.name:''),14,21);doc.text(today,pw-14,21,{align:'right'});
  var cod=D.done.filter(function(x){return x.payment.toUpperCase()==='COD';}).reduce(function(a,x){return a+x.balance;},0);
  var all=D.done.concat(D.ret).concat(D.hold).concat(D.pending);
  doc.autoTable({startY:36,head:[['Summary','']],body:[['Total',all.length],['Delivered',D.done.length],['Returns',D.ret.length],['Hold',D.hold.length],['Pending',D.pending.length],['COD Collected','AED '+cod]],styles:{fontSize:9,cellPadding:3},headStyles:{fillColor:[26,86,219],textColor:255},theme:'grid',margin:{left:14},tableWidth:100});
  var y=doc.lastAutoTable.finalY+10;
  doc.setFontSize(11);doc.setFont('helvetica','bold');doc.setTextColor(30,30,30);doc.text('Shipment Details',14,y);
  doc.autoTable({startY:y+4,head:[['Con.No','Company','Customer','Area','Payment','Status','Reason']],
    body:all.map(function(x){return[x.con,x.company,x.customer,x.area,x.payment.toUpperCase()==='COD'?'COD AED '+x.balance:'Online',x.status,x.returnReason||x.holdReason||'-'];}),
    styles:{fontSize:8,cellPadding:2.5},headStyles:{fillColor:[26,86,219],textColor:255},alternateRowStyles:{fillColor:[248,250,255]},
    columnStyles:{0:{cellWidth:22},1:{cellWidth:18},2:{cellWidth:32},3:{cellWidth:20},4:{cellWidth:22},5:{cellWidth:18},6:{cellWidth:28}},margin:{left:14}});
  doc.save('SmartFix_Rider_'+new Date().toISOString().slice(0,10)+'.pdf');
  toast('✅ PDF saved!');
}

// ── START ──
// Check saved session - rider stays logged in
if(loadSession()){launch();}
</script>
</body>
</html>
